name: Build & Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64, osx-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install fonts
        run: |
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y --no-install-recommends ttf-mscorefonts-installer
          fc-cache -f

      - name: Publish
        run: |
          dotnet publish Game1.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            --output publish/${{ matrix.rid }}

      - name: Zip artifact
        run: zip -j pong-${{ matrix.rid }}.zip publish/${{ matrix.rid }}/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pong-${{ matrix.rid }}
          path: pong-${{ matrix.rid }}.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          files: artifacts/**/*.zip
